---
# JSM Home Assistant Notifier — Docker Compose
#
# Quickstart:
#   1. cp .env.example .env  and fill in your values
#   2. docker compose up -d
#
# To build locally instead of pulling from GHCR, swap the `image:` line for:
#   build: .

services:
  jsm-ha-notifier:
    # Pinned to a specific release so `docker compose pull` never silently
    # swaps the code under you (supply-chain safety).  To update, bump the
    # tag to the new release and re-run `docker compose up -d`.
    # Floating alternatives (opt-in, you accept auto-updates):
    #   :1.3     follow patch releases      :1      follow minor releases
    #   :latest  follow every release — NOT recommended
    image: ghcr.io/realdougeubanks/jsm-ha-notifier:1.3.0
    container_name: jsm-ha-notifier
    restart: unless-stopped

    ports:
      # Bind to localhost only — use a reverse proxy or tunnel for external
      # access.  Change to "0.0.0.0:8080:8080" only if you understand the
      # security implications (no TLS, no auth by default).
      - "127.0.0.1:8080:8080"

    # All secrets live in .env — never committed to git
    env_file:
      - .env

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # ── Incident dashboard persistence (optional) ────────────────────────
    # The default INCIDENT_DB_PATH=/tmp/incidents.db lives on the tmpfs
    # above, so incident history is ALWAYS wiped on container restart.
    # To persist it, uncomment the volume below AND set in .env:
    #   INCIDENT_DB_PATH=/data/incidents.db
    # volumes:
    #   - incident-data:/data

# Uncomment together with the service volume above.
# volumes:
#   incident-data:
