---
# JSM Home Assistant Notifier — Docker Compose
#
# Quickstart:
#   1. cp .env.example .env  and fill in your values
#   2. docker compose up -d          (builds the image automatically)
#
# To use a pre-built GHCR image instead of building locally, comment out
# the `build:` / `image: jsm-ha-notifier:latest` lines and uncomment the
# `image: ghcr.io/...` line, then run `docker compose pull && docker compose up -d`.

services:
  jsm-ha-notifier:
    # ── Local build (default — use this when developing or self-hosting) ──
    # Run `docker build -t jsm-ha-notifier .` first, or let compose build
    # automatically by keeping the `build:` line.  This is what you want
    # when no published GHCR image exists yet for the current code.
    build: .
    image: jsm-ha-notifier:latest

    # ── Published GHCR image (swap in for production / unattended hosts) ──
    # Pin to a specific release so `docker compose pull` never silently
    # swaps the code under you (supply-chain safety).  Comment out the two
    # lines above and uncomment the one below, bumping the tag each release.
    # Floating alternatives: :2.3  (minor) or :2  (major) for auto-updates.
    # image: ghcr.io/realdougeubanks/jsm-ha-notifier:2.3.0
    container_name: jsm-ha-notifier
    restart: unless-stopped

    ports:
      # Bind to localhost only — use a reverse proxy or tunnel for external
      # access.  Change to "0.0.0.0:8080:8080" only if you understand the
      # security implications (no TLS, no auth by default).
      - "127.0.0.1:8080:8080"

    # All secrets live in .env — never committed to git
    env_file:
      - .env

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # ── Incident dashboard persistence (optional) ────────────────────────
    # The default INCIDENT_DB_PATH=/tmp/incidents.db lives on the tmpfs
    # above, so incident history is ALWAYS wiped on container restart.
    # To persist it, uncomment the volume below AND set in .env:
    #   INCIDENT_DB_PATH=/data/incidents.db
    # volumes:
    #   - incident-data:/data

# Uncomment together with the service volume above.
# volumes:
#   incident-data:
