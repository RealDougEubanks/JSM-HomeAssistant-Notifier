name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: realdougeubanks/jsm-ha-notifier
  # GHCR image — uses the GitHub username/org automatically
  GHCR_IMAGE: ${{ github.repository_owner }}/jsm-ha-notifier

jobs:
  build-and-push:
    name: Build and push to GHCR + Docker Hub
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write
      security-events: write   # For uploading Trivy SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry logins ───────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        # Only attempt Docker Hub login if credentials are configured.
        # Skip gracefully if DOCKERHUB_USERNAME secret is not set.
        if: vars.DOCKERHUB_USERNAME != '' || secrets.DOCKERHUB_TOKEN != ''
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Metadata ──────────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Branch builds: :main
            type=ref,event=branch
            # Tag builds: :v1.2.3
            type=ref,event=tag
            # Short SHA: :abc1234
            type=sha,prefix=
            # latest only on default branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=JSM Home Assistant Notifier
            org.opencontainers.image.description=Bridges JSM/OpsGenie alerts to Home Assistant TTS and notifications
            org.opencontainers.image.vendor=RealDougEubanks

      # ── Build & push ──────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scanning ─────────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true  # Don't block release, but do report

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

      - name: Image digest
        run: |
          echo "### Published images:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
