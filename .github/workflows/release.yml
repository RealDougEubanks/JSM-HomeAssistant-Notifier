name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: dougeubanks/jsm-ha-notifier
  # GHCR image — uses the GitHub username/org automatically
  GHCR_IMAGE: ${{ github.repository_owner }}/jsm-ha-notifier

jobs:
  build-and-push:
    name: Build and push to GHCR + Docker Hub
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write
      security-events: write   # For uploading Trivy SARIF results
      id-token: write          # For cosign keyless signing and SLSA provenance
      attestations: write      # For GitHub build provenance attestations

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Build tooling ───────────────────────────────────────────────────
      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      # ── Registry logins ─────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        # Only attempt Docker Hub login if credentials are configured.
        if: vars.DOCKERHUB_USERNAME != ''
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Metadata ────────────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Branch builds: :main
            type=ref,event=branch
            # Tag builds: :v1.2.3
            type=ref,event=tag
            # Short SHA: :abc1234
            type=sha,prefix=
            # latest only on default branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=JSM Home Assistant Notifier
            org.opencontainers.image.description=Bridges JSM/OpsGenie alerts to Home Assistant TTS and notifications
            org.opencontainers.image.vendor=RealDougEubanks

      # ── Build & push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image signing with cosign (keyless / Sigstore) ──────────────────
      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sign the GHCR image digest using keyless signing (Sigstore OIDC).
          # This proves the image was built by this GitHub Actions workflow.
          cosign sign --yes \
            "${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}@${DIGEST}"

      # ── SLSA build provenance attestation ───────────────────────────────
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── Security scanning ───────────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true  # Don't block release, but do report

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "### Published images" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Signed:** cosign keyless (Sigstore OIDC)" >> $GITHUB_STEP_SUMMARY
          echo "**Provenance:** SLSA Build Level 2 (GitHub attestation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verify with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}@${{ steps.build.outputs.digest }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp github.com/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
